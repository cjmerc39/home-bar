<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Home Bar</title>
<meta name="theme-color" content="#1a1410">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1410; --bg2:#241c15; --bg3:#2e241a; --line:#3a2f22;
  --ink:#f1e6d0; --mut:#b7a789; --dim:#7d6c55;
  --brass:#c9a15a; --brass2:#e2c184; --brassdim:#8f7440;
  --low:#d9832e; --out:#6b5b48; --bad:#c25b4a;
  --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* html painted walnut so iOS standalone letterboxing never shows black bands */
html{height:100%;background:var(--bg)}
/* app-shell layout: header + scrolling main + tab bar as flex rows; only
   <main> scrolls. Installed (standalone) iOS sizes the page as if Safari's
   toolbar were present, leaving a phantom gap — 100lvh ignores it. Safari
   itself keeps dvh, which tracks the real toolbar correctly. */
body{background:var(--bg);color:var(--ink);font:15px/1.45 var(--sans);height:100%;display:flex;flex-direction:column;overflow:hidden}
@supports (height:100dvh){body{height:100dvh}}
@media (display-mode: standalone){
  @supports (height:100lvh){body{height:100lvh}}
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(120% 90% at 50% 0%, rgba(255,220,160,.045), transparent 55%),
             radial-gradient(140% 120% at 50% 110%, rgba(0,0,0,.5), transparent 60%)}
h1,h2,h3,.serif{font-family:var(--serif)}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink);background:var(--bg3);border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%}
input:focus,select:focus,textarea:focus{outline:1px solid var(--brassdim)}
::placeholder{color:var(--dim)}
main{position:relative;z-index:1;width:100%;max-width:640px;margin:0 auto;padding:0 14px 16px;flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* top bar */
#topbar{flex:none;width:100%;max-width:640px;margin:0 auto;background:var(--bg);padding:calc(14px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:baseline;gap:10px}
#topbar h1{font-size:26px;letter-spacing:.5px;color:var(--brass2);font-weight:700}
#topbar .sub{color:var(--dim);font-size:12px;letter-spacing:2px;text-transform:uppercase}
#btn-settings{margin-left:auto;color:var(--mut);font-size:19px;padding:2px 6px}
/* tabs */
#tabbar{flex:none;width:100%;background:rgba(20,15,11,.96);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
#tabbar .row{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
#tabbar button{padding:13px 4px 12px;color:var(--dim);font-size:12px;letter-spacing:1.6px;text-transform:uppercase}
#tabbar button.on{color:var(--brass2)}
#tabbar button.on span{border-bottom:2px solid var(--brass);padding-bottom:4px}
section.view{display:none;padding-bottom:24px}
section.view.on{display:block}
/* menu mode strips chrome */
body.menuMode #tabbar,body.menuMode #topbar{display:none}
/* generic bits */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.rowline{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.mut{color:var(--mut)} .dim{color:var(--dim)} .small{font-size:12.5px}
.brass{color:var(--brass2)}
.hidden{display:none!important}
.htitle{font-size:19px;color:var(--brass2);margin:20px 0 10px;letter-spacing:.4px}
.chip{display:inline-block;font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:99px;padding:3px 9px}
.abtn{display:inline-block;background:var(--brass);color:#241a0c;font-weight:600;border-radius:9px;padding:10px 16px;text-align:center}
.abtn.ghost{background:transparent;color:var(--brass2);border:1px solid var(--brassdim)}
.abtn.danger{background:transparent;color:var(--bad);border:1px solid var(--bad)}
.abtn:disabled{opacity:.45}
.fieldlbl{display:block;font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin:12px 0 4px}
/* shelf */
#shelf-tools{display:flex;gap:8px;margin:4px 0 14px}
#shelf-tools input{flex:1}
#shelf-tools .abtn{white-space:nowrap;padding:9px 13px}
.cathead{font-size:12px;letter-spacing:2.2px;text-transform:uppercase;color:var(--dim);margin:16px 2px 7px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.cathead .cnt{color:var(--brassdim)}
.cathead .chev{margin-left:auto;color:var(--dim);font-size:10px}
.bottle{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
.bottle .bname{font-weight:600}
.bottle .bsub{font-size:12px;color:var(--mut)}
.bottle.out .bname{color:var(--out);text-decoration:line-through}
.sipmark{color:var(--brass);font-size:12px}
.poursug{color:var(--dim);font-size:12px}
.poursug .brass{color:var(--brass2)}
.goodtag{font-size:11px;color:var(--brass2);letter-spacing:1px;text-transform:uppercase}
.bar-sip{fill:var(--brass2);font-size:7px}
.lvl{font-size:11px;letter-spacing:1px;text-transform:uppercase;border-radius:99px;padding:4px 10px;border:1px solid}
.lvl.full{color:var(--brass2);border-color:var(--brassdim)}
.lvl.low{color:var(--low);border-color:var(--low)}
.lvl.out{color:var(--out);border-color:var(--out)}
.editb{color:var(--dim);padding:6px;font-size:15px}
#empty-shelf{text-align:center;padding:44px 20px;color:var(--mut)}
#empty-shelf .glass{font-size:44px;color:var(--brassdim);font-family:var(--serif)}
#empty-shelf h2{margin:10px 0 6px;color:var(--brass2)}
#empty-shelf .abtn{margin:14px 6px 0}
/* specs */
#spec-filters{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 14px}
#spec-filters .chip{cursor:pointer}
#spec-filters .chip.on{color:#241a0c;background:var(--brass);border-color:var(--brass)}
.rcard{display:flex;align-items:center;gap:10px;cursor:pointer}
.rcard .rname{font-family:var(--serif);font-size:18px}
.rcard .stars{color:var(--brass);font-size:12px;letter-spacing:2px}
.mdot{width:9px;height:9px;border-radius:99px;background:var(--line);flex:none}
.mdot.mk{background:var(--brass)} .mdot.lw{background:var(--low)}
.housestar{color:var(--brass);font-size:15px}
/* tonight */
.tonight-item .rname{font-family:var(--serif);font-size:17px}
.lowtag{font-size:11px;color:var(--low);letter-spacing:1px;text-transform:uppercase}
.unlock .buy{color:var(--brass2);font-weight:600}
.shopline{display:flex;gap:8px;align-items:baseline}
/* menu */
#view-menu{padding:34px 8px calc(60px + env(safe-area-inset-bottom));text-align:center}
#menu-exit{position:fixed;top:calc(10px + env(safe-area-inset-top));right:12px;color:var(--m-dim,var(--dim));font-size:20px;z-index:7;padding:8px}
#menu-share{position:fixed;top:calc(12px + env(safe-area-inset-top));left:12px;color:var(--m-dim,var(--dim));font-size:16px;z-index:7;padding:8px}
#menu-curate{position:fixed;top:calc(12px + env(safe-area-inset-top));left:52px;color:var(--m-dim,var(--dim));font-size:16px;z-index:7;padding:8px}
#menu-reqs{position:fixed;top:calc(12px + env(safe-area-inset-top));left:92px;color:var(--m-dim,var(--dim));font-size:14px;z-index:7;padding:8px;white-space:nowrap}
.wthumb{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--line);flex:none}
.wthumb.big{width:110px;height:110px}
.wph{width:54px;height:54px;border-radius:8px;border:1px dashed var(--brassdim);display:flex;align-items:center;justify-content:center;color:var(--brassdim);flex:none;font-size:20px}
.wish{cursor:pointer}
.wname{font-weight:600}
.sgwrap{position:relative}
.suggest{position:absolute;left:0;right:0;top:100%;margin-top:2px;z-index:60;background:var(--bg3);border:1px solid var(--brassdim);border-radius:9px;max-height:190px;overflow-y:auto;box-shadow:0 8px 22px rgba(0,0,0,.5)}
.sg-item{padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer}
.sg-item:last-child{border-bottom:0}
.msec{display:flex;align-items:center;gap:14px;max-width:420px;margin:48px auto 24px;color:var(--m-accent,var(--brass2));font-family:var(--serif);font-size:14px;letter-spacing:4px;text-transform:uppercase}
.msec::before,.msec::after{content:'';flex:1;border-top:1px solid var(--m-rule,var(--brassdim));opacity:.6}
.aibox{background:var(--bg3);border:1px dashed var(--brassdim);border-radius:10px;padding:10px;margin:10px 0 2px}
.aibox .ttl{color:var(--brass2);font-size:13px;letter-spacing:.6px;margin-bottom:6px}
.menu-head{font-family:var(--serif);font-size:38px;color:var(--m-accent,var(--brass2));letter-spacing:1px}
.menu-rule{width:74px;margin:14px auto 8px;border:0;border-top:1px solid var(--m-rule,var(--brassdim))}
.menu-sub{font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:var(--m-dim,var(--dim));margin-bottom:30px}
.mitem{margin:0 auto 26px;max-width:440px}
.mitem .mname{font-family:var(--serif);font-size:23px;color:var(--m-ink,var(--ink))}
.mitem .mdesc{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--m-mut,var(--mut));margin-top:4px}
.mitem .housestar{margin-right:6px}
.mcat{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--m-accent,var(--brass2));margin:20px 0 12px}
.mitem.feature{border:1px solid var(--m-rule,var(--brassdim));border-radius:12px;padding:18px 20px;max-width:420px}
.mitem.feature .mname{font-size:27px}
.mname.dead{text-decoration:line-through;opacity:.55}
.chip86{font-size:10px;letter-spacing:2px;color:var(--low);border:1px solid var(--low);border-radius:99px;padding:2px 8px;margin-left:8px;text-transform:uppercase;vertical-align:middle;text-decoration:none;display:inline-block}
.prow{display:flex;align-items:baseline;gap:8px;max-width:400px;margin:0 auto 10px;text-align:left}
.prow .pn{font-family:var(--serif);font-size:17px;color:var(--m-ink,var(--ink))}
.prow .dots{flex:1;border-bottom:1px dotted var(--m-rule,var(--brassdim));transform:translateY(-4px);min-width:24px}
.prow .pt{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--m-mut,var(--mut))}
#menu-empty{color:var(--m-dim,var(--dim));font-family:var(--serif);font-style:italic;margin-top:60px}
/* modal */
#modalwrap{position:fixed;inset:0;z-index:20;display:none;background:rgba(10,7,5,.7);align-items:flex-end;justify-content:center}
#modalwrap.on{display:flex}
#modal{background:var(--bg2);border:1px solid var(--line);border-bottom:0;border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:18px 16px calc(24px + env(safe-area-inset-bottom))}
#modal h2{color:var(--brass2);font-size:21px;margin-bottom:4px}
.mclose{float:right;color:var(--dim);font-size:20px;padding:0 4px}
.formrow{display:flex;gap:8px} .formrow>*{flex:1}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{flex:1;padding:9px 4px;color:var(--mut);font-size:13px;background:var(--bg3)}
.seg button.on{background:var(--brass);color:#241a0c;font-weight:600}
.ingrow{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:9px;margin-bottom:8px}
.ingrow .formrow{margin-bottom:6px}
.ingrow .del{color:var(--bad);font-size:12px;letter-spacing:1px;text-transform:uppercase}
.starpick{font-size:26px;letter-spacing:6px;color:var(--brassdim);cursor:pointer}
.starpick .lit{color:var(--brass)}
.scanrow{display:flex;gap:9px;align-items:center;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:9px;margin-bottom:8px}
.scanrow input[type=checkbox]{width:auto;transform:scale(1.25)}
.scanrow .dup{font-size:11px;color:var(--low)}
.spin{margin:26px auto;width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--brass);border-radius:99px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + env(safe-area-inset-bottom));background:var(--bg3);border:1px solid var(--brassdim);color:var(--ink);padding:10px 18px;border-radius:99px;z-index:30;display:none;font-size:14px;max-width:88vw;text-align:center}
#toast.on{display:block}
#toast .tact{color:var(--brass2);font-weight:700;margin-left:10px;text-decoration:underline;text-underline-offset:3px}
.bnote{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ing-line{display:flex;gap:8px;padding:3px 0}
.ing-line .qty{color:var(--brass2);min-width:64px;text-align:right}
.ing-line.miss .lbl{color:var(--bad)}
.detmeta{color:var(--mut);font-size:13px;margin:6px 0 2px}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0}
/* shelf & specs view toggles */
.vtog{display:flex;align-items:center;justify-content:center;padding:9px 10px!important}
#spec-tools{display:flex;gap:8px;margin:4px 0 12px}
#spec-tools input{flex:1}
/* bar view (shelf as a back bar) */
svg.barshelf{display:block;width:100%;overflow:visible}
.bar-bottle{cursor:pointer}
.bar-outline{fill:rgba(241,230,208,.05);stroke:var(--brass);stroke-width:1.5;stroke-linejoin:round}
.bar-liquid{transition:y .55s cubic-bezier(.4,0,.2,1),height .55s cubic-bezier(.4,0,.2,1),fill .55s}
.bar-liquid.full{fill:rgba(201,161,90,.82)}
.bar-liquid.low{fill:rgba(217,131,46,.88)}
.bar-liquid.out{fill:rgba(107,91,72,0)}
.bar-bottle.out .bar-outline{stroke:var(--out);fill:rgba(107,91,72,.05)}
.bar-name{font-size:9px;fill:var(--mut)}
.bar-bottle.out .bar-name{fill:var(--out);text-decoration:line-through}
.bar-edit text{font-size:10px;fill:var(--brassdim)}
.bar-edit circle{pointer-events:all}
.lblband rect{fill:var(--brassdim);opacity:.9}
.lblband text{font-size:5.5px;fill:#241a0c;font-weight:600}
.bar-thumb{opacity:.92}
.shelfline{stroke:var(--brassdim);stroke-width:1.2;opacity:.75}
/* scan confirm thumbnails */
.scanthumb{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex:none}
span.scanthumb{display:block;background:var(--bg2)}
/* flavor galaxy */
#galaxy{display:block;width:100%}
#galaxy .star{cursor:pointer}
#galaxy .tap{fill:transparent;pointer-events:all}
#galaxy .core,#galaxy .glow{fill:var(--brass)}
#galaxy .glow{opacity:.22}
#galaxy .core-star{fill:var(--brass);font-size:13px}
#galaxy .star.lw .core,#galaxy .star.lw .glow,#galaxy .star.lw .core-star{fill:var(--low)}
#galaxy .star.dim .core{fill:#4d3e2b}
#galaxy .star.dim .core-star{fill:#5a4933}
#galaxy .slabel{font-family:var(--serif);font-size:10.5px;fill:var(--mut);paint-order:stroke;stroke:#211913;stroke-width:2.6px;stroke-linejoin:round}
#galaxy .star.lw .slabel{fill:var(--low)}
#galaxy .star.faded{opacity:.16}
.gx-axis{font-size:9px;letter-spacing:2.4px;text-transform:uppercase;fill:var(--dim)}
/* liquid intelligence */
#li-toggle{display:flex;align-items:center;width:100%;padding:4px 0;color:var(--brass2)}
#li-toggle .t{font-family:var(--serif);font-size:16.5px;flex:1;text-align:left}
#li-chart{display:block;width:100%;touch-action:pan-y}
.li-temp{fill:none;stroke:var(--brass);stroke-width:2}
.li-dil{fill:none;stroke:var(--ink);stroke-width:1.3;opacity:.85}
.li-ghost{fill:none;stroke:var(--dim);stroke-width:1.2;stroke-dasharray:4 3;opacity:.7}
.li-ax{font-size:8.5px;fill:var(--dim)}
.li-lbl{font-size:8.5px;letter-spacing:.6px}
.li-target{stroke:var(--brassdim);stroke-dasharray:2 3}
#li-cursor{stroke:var(--brass2);stroke-width:1}
#li-verdict{font-family:var(--serif);color:var(--brass2);font-size:15.5px;margin:9px 0 3px}
/* the drink render (recipe detail only) */
.drinkrender{flex:none}
.dr-glass{fill:rgba(241,230,208,.05);stroke:var(--mut);stroke-width:1.4;stroke-linejoin:round}
.dr-chrome{fill:none;stroke:var(--mut);stroke-width:1.4;stroke-linecap:round}
.dr-float{stroke:rgba(0,0,0,.25);stroke-width:.4}
.dr-foam{fill:rgba(246,243,236,.75)}
.dr-ice{fill:rgba(255,255,255,.10);stroke:rgba(255,255,255,.38);stroke-width:.9}
.dr-verdict{font-family:var(--serif);color:var(--brass2);font-size:14px;margin-top:5px}
/* weather ambient line */
#wx-line{letter-spacing:.4px;margin:6px 2px 8px}
/* menu themes: the admin app stays walnut forever; Menu Mode consumes --m-* vars
   whose golden defaults equal today's values exactly */
body.menuMode{--m-bg:var(--bg);--m-ink:var(--ink);--m-mut:var(--mut);--m-dim:var(--dim);--m-accent:var(--brass2);--m-rule:var(--brassdim);--m-vig:1;background:var(--m-bg)}
body.menuMode::before{opacity:var(--m-vig)}
body.menuMode #view-menu{color:var(--m-ink)}
body.menuMode .housestar{color:var(--m-accent)}
body.menuMode .chip86{color:var(--low)}
/* m-anim arms a beat after entering menu mode, so theme picks and the sundown
   flip glide (~8s, the room dims) while tab entry stays instant */
body.menuMode.m-anim{transition:background-color 8s ease}
body.menuMode.m-anim::before{transition:opacity 8s ease}
body.menuMode.m-anim #view-menu, body.menuMode.m-anim #view-menu *{transition:color 8s ease,border-color 8s ease}
/* golden hour: today's walnut; dusk deepens a step, accent warms */
body.menuMode[data-theme="golden"][data-dusk]{--m-bg:#140f0b;--m-accent:#e6c689}
/* midnight deco */
body.menuMode[data-theme="deco"]{--m-bg:#0b0b0d;--m-ink:#e8dcc0;--m-mut:#b0a488;--m-dim:#6e6752;--m-accent:#d4b96a;--m-rule:#8a7a4e;--m-vig:.45}
body.menuMode[data-theme="deco"][data-dusk]{--m-bg:#070708;--m-accent:#b3985a}
body.menuMode[data-theme="deco"] .msec::before,body.menuMode[data-theme="deco"] .msec::after{border-top:3px double var(--m-rule)}
body.menuMode[data-theme="deco"] .menu-rule{border-top:3px double var(--m-rule)}
/* bistro blanc: the lone light theme, and the print face */
body.menuMode[data-theme="blanc"]{--m-bg:#f4ecdc;--m-ink:#221d17;--m-mut:#5c5344;--m-dim:#8a7d68;--m-accent:#7a5c2e;--m-rule:#b9a888;--m-vig:0}
body.menuMode[data-theme="blanc"][data-dusk]{--m-bg:#ead9bd;--m-ink:#2a2118}
/* cassis: wine-dark and candlelit — antique gold, never silver */
body.menuMode[data-theme="cassis"]{--m-bg:#241a2b;--m-ink:#c9b8d4;--m-mut:#a795b8;--m-dim:#7c6d8c;--m-accent:#c2a35c;--m-rule:#6f5f7e;--m-vig:.8}
body.menuMode[data-theme="cassis"][data-dusk]{--m-bg:#1b1322;--m-ink:#b3a3c0;--m-mut:#998aa8}
/* nochebuena: pine, gold, oxblood rules — one drink, one season */
body.menuMode[data-theme="nochebuena"]{--m-bg:#12211a;--m-ink:#f1e6d0;--m-mut:#c3b49a;--m-dim:#7f8b7a;--m-accent:#cfa54b;--m-rule:#7e2f33;--m-vig:.7}
body.menuMode[data-theme="nochebuena"][data-dusk]{--m-bg:#0c1812;--m-accent:#c1963f}
/* theme swatches in the curate sheet */
.thsw{display:block;width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;text-align:left}
.thsw.on{outline:2px solid var(--brass)}
.thsw .thname{font-family:var(--serif);font-size:17px}

<body>
<header id="topbar">
  <h1>Home Bar</h1><span class="sub">est. 2026</span>
  <button id="btn-settings" title="Settings">&#9881;</button>
</header>
<main>
  <section id="view-shelf" class="view">
    <div id="shelf-tools">
      <input id="shelf-search" type="search" placeholder="Search the shelf&hellip;">
      <button class="abtn ghost vtog" id="btn-shelfview" title="Bar view"></button>
      <button class="abtn ghost" id="btn-scan">&#128247; Scan</button>
      <button class="abtn" id="btn-addbottle">+ Add</button>
    </div>
    <div id="shelf-list"></div>
    <div id="empty-shelf" class="hidden">
      <div class="glass serif">&#129346;</div>
      <h2>The shelf is bare</h2>
      <div class="small mut">Photograph your bar and let the AI read the labels,<br>or add bottles by hand.</div>
      <div>
        <button class="abtn" id="btn-scan-empty">&#128247; Scan the shelf</button>
        <button class="abtn ghost" id="btn-add-empty">Add a bottle</button>
      </div>
    </div>
    <h2 class="htitle">Wishlist</h2>
    <div id="wish-list"></div>
    <button class="abtn ghost" id="btn-addwish" style="width:100%;margin-top:6px">+ Add to wishlist</button>
  </section>

  <section id="view-specs" class="view">
    <div id="spec-tools">
      <input id="spec-search" type="search" placeholder="Search drinks or ingredients &mdash; try &quot;campari&quot;&hellip;">
      <button class="abtn ghost vtog" id="btn-specsview" title="Flavor galaxy"></button>
    </div>
    <div id="spec-filters"></div>
    <div id="spec-list"></div>
    <button class="abtn ghost" id="btn-addrecipe" style="width:100%;margin-top:6px">+ New recipe</button>
  </section>

  <section id="view-tonight" class="view">
    <div id="wx-line" class="small dim hidden"></div>
    <div class="card hidden" id="bartender-box">
      <b>Ask the bartender</b>
      <div class="small mut" style="margin-bottom:8px">What should I make tonight?</div>
      <input id="bt-mood" placeholder="mood, weather, occasion&hellip; (optional)">
      <button class="abtn" id="bt-ask" style="width:100%;margin-top:8px">&#129347; Recommend something</button>
    </div>
    <h2 class="htitle">Makeable now</h2>
    <div id="makeable-list"></div>
    <h2 class="htitle">One bottle away</h2>
    <div id="unlock-list"></div>
    <h2 class="htitle">Shopping list</h2>
    <div id="shopping-list"></div>
  </section>

  <section id="view-menu" class="view">
    <button id="menu-exit" title="Back to the bar">&times;</button>
    <button id="menu-share" title="Share the menu">&#10548;</button>
    <button id="menu-curate" title="Choose cocktails">&#9998;</button>
    <button id="menu-reqs" class="hidden" title="Drink requests">&#128276;</button>
    <div id="menu-body"></div>
  </section>
</main>

<nav id="tabbar"><div class="row">
  <button data-tab="shelf" class="on"><span>Shelf</span></button>
  <button data-tab="specs"><span>Specs</span></button>
  <button data-tab="tonight"><span>Tonight</span></button>
  <button data-tab="menu"><span>Menu</span></button>
</div></nav>

let S = null;
function fresh(){ return { v:1, bottles:[], recipes:seedRecipes(), staples:DEFAULT_STAPLES.slice(), menuTitle:"CJ's Bar", collapsedCats:[], wishlist:[], menuSelection:null, pourSelection:null, featureId:null, featureLabel:'drink of the night', beerWine:[], customBW:[], menuId:null, menuOwner:null, savedAt:0, shelfView:'list', specsView:'list', nerdMode:false, menuTheme:'golden', geo:null, geoAsked:false }; }
const THEME_KEYS = ['golden','deco','blanc','cassis','nochebuena'];
function validTheme(t){ return THEME_KEYS.includes(t) ? t : 'golden'; }
// geo is rounded to 2 decimals (~1km) before it ever lands in state — the weather
// doesn't need more and a backup file shouldn't carry a precise home address
function cleanGeo(g){
  if(!g || typeof g.lat !== 'number' || typeof g.lon !== 'number' || !isFinite(g.lat) || !isFinite(g.lon)) return null;
  return { lat: Math.round(g.lat*100)/100, lon: Math.round(g.lon*100)/100 };
}
function load(){
  let raw = null;
  try{ raw = localStorage.getItem(KEY); }catch(e){}
  if(!raw) return fresh();
  let d = null;
  try{ d = JSON.parse(raw); }catch(e){}
  if(!d || typeof d !== 'object' || d.v !== 1){
    // migration guard: unknown/future schema -> keep a backup, start clean
    try{ localStorage.setItem(KEY + '-backup', raw); }catch(e){}
    return fresh();
  }
  if(!Array.isArray(d.bottles)) d.bottles = [];
  if(!Array.isArray(d.recipes) || !d.recipes.length) d.recipes = seedRecipes();
  if(!Array.isArray(d.staples)) d.staples = DEFAULT_STAPLES.slice();
  if(typeof d.menuTitle !== 'string') d.menuTitle = "CJ's Bar";
  if(!Array.isArray(d.collapsedCats)) d.collapsedCats = [];
  if(!Array.isArray(d.wishlist)) d.wishlist = [];
  if(!Array.isArray(d.menuSelection)) d.menuSelection = null;
  if(!Array.isArray(d.pourSelection)) d.pourSelection = null;
  if(typeof d.featureId !== 'string') d.featureId = null;
  if(typeof d.featureLabel !== 'string' || !d.featureLabel.trim()) d.featureLabel = 'drink of the night';
  if(!Array.isArray(d.beerWine)) d.beerWine = [];

/* ============================== matcher ============================== */
function norm(s){ return String(s==null?'':s).trim().toLowerCase(); }

function tagLabel(t){

  if(TAG_LABELS[k]) return TAG_LABELS[k];
  if(['mixer','spice','milk'].includes(norm(t.category)) && t.subtype) return norm(t.subtype);
  return t.subtype ? norm(t.subtype) + ' ' + norm(t.category) : norm(t.category);
}
function bottleMatchesTag(b, tag){
  if(norm(b.category) !== norm(tag.category)) return false;
  if(tag.subtype && norm(b.subtype) !== norm(tag.subtype)) return false;
  return true;
}
// -> { ok, low, kind, key, label }
function reqStatus(req){
  if(req.staple){
    const ok = S.staples.some(s => norm(s) === norm(req.staple));
    return { ok, low:false, kind:'staple', key:'staple:'+norm(req.staple), label:norm(req.staple) };
  }
  if(req.bottleId){
    const b = S.bottles.find(x => x.id === req.bottleId);
    const ok = !!b && b.level !== 'out';
    return { ok, low: ok && b.level==='low', kind:'bottle', key:'bottle:'+req.bottleId, label: b ? b.name : 'a specific bottle' };
  }
  const tag = req.tag || {};
  const matches = S.bottles.filter(b => b.level !== 'out' && bottleMatchesTag(b, tag));
  const ok = matches.length > 0;
  const low = ok && !matches.some(m => m.level === 'full'); // only low bottles can satisfy it
  return { ok, low, kind:'tag', key:'tag:'+tagKey(tag), label: tagLabel(tag) };
}
// Only bottles of alcohol gate a recipe. Staples, mixers, and household
// ingredients (seasonal coquito spices, sodas…) never block or get flagged.
const GATING_CATS = ['tequila','mezcal','whiskey','rum','gin','vodka','brandy','amaro','liqueur','vermouth','bitters','wine'];
function reqGates(req){
  if(req.bottleId) return true;
  if(req.tag) return GATING_CATS.includes(norm(req.tag.category));
  return false; // staples never gate
}
// -> { makeable, low, missing:[{req,status}] } — missing holds gating reqs only
function recipeStatus(r){
  const missing = []; let low = false;
  for(const ing of r.ingredients){
    const st = reqStatus(ing.req);
    if(!st.ok){ if(reqGates(ing.req)) missing.push({ req: ing.req, status: st }); }
    else if(st.low) low = true;
  }
  return { makeable: missing.length === 0, low: missing.length === 0 && low, missing };
}
// recipes missing exactly one non-staple req, grouped by that req
function unlockGroups(){
  const groups = {};
  for(const r of S.recipes){
    const st = recipeStatus(r);
    if(st.missing.length !== 1) continue;
    const m = st.missing[0];
    if(m.status.kind === 'staple') continue;
    const g = groups[m.status.key] || (groups[m.status.key] = { key:m.status.key, label:m.status.label, recipes:[] });
    g.recipes.push(r.name);
  }
  return Object.values(groups).sort((a,b) => b.recipes.length - a.recipes.length || a.label.localeCompare(b.label));
}
/* sipping bottles (b.sip): too good to mix. The flag STEERS, it never BLOCKS —
   the matcher above is untouched, so marking your best bourbon can't make
   drinks vanish. pourPick says which bottle to actually grab. */
function pourPick(req){ // -> { bottle, sipOnly } | null — deterministic
  if(!req || req.staple) return null;
  if(req.bottleId){
    const b = S.bottles.find(x => x.id === req.bottleId && x.level !== 'out');
    return b ? { bottle: b, sipOnly: !!b.sip } : null;
  }
  if(!req.tag) return null;
  const matches = S.bottles.filter(b => b.level !== 'out' && bottleMatchesTag(b, req.tag));
  if(!matches.length) return null;
  const rank = b => (b.sip ? 2 : 0) + (b.level === 'low' ? 1 : 0); // everyday beats sip, full beats low
  matches.sort((a,z) => rank(a) - rank(z) || a.name.localeCompare(z.name));
  return { bottle: matches[0], sipOnly: matches.every(b => b.sip) };
}
function recipeSipOnly(r){ // advisory: some pour would have to come from a ✦ bottle
  for(const ing of r.ingredients){
    const req = ing.req || {};
    if(!reqGates(req)) continue;
    if(req.bottleId){
      const b = S.bottles.find(x => x.id === req.bottleId);
      if(b && b.level !== 'out' && b.sip) return true;
      continue;
    }
    if(!req.tag) continue;
    const m = S.bottles.filter(b => b.level !== 'out' && bottleMatchesTag(b, req.tag));
    if(m.length && m.every(b => b.sip)) return true;
  }
  return false;
}

/* ============================== flavor galaxy ============================== */
// A recipe without baked `flavor` coordinates gets a deterministic heuristic
// placement: citrus pushes bright, bubbles and non-alcohol volume push
// refreshing, the amaro/bitters share pushes bitter, an all-spirit stir sinks
// boozy, and cream/egg/coconut pull everything back toward the center.
const SODA_SUBTYPES = ['soda water','tonic','ginger beer','cola','grapefruit soda'];
function flavorOf(r){
  let total=0, alc=0, bitter=0, soda=0, citrus=0, soft=0;
  for(const ing of (r && r.ingredients) || []){
    const v = ingVolOz(ing); if(v <= 0) continue;
    total += v;
    const req = ing.req || {};
    let cat=null, sub='';
    if(req.tag){ cat = norm(req.tag.category); sub = norm(req.tag.subtype||''); }
    else if(req.bottleId){ const b = S.bottles.find(x => x.id === req.bottleId); if(b){ cat = norm(b.category); sub = norm(b.subtype||''); } }
    const st = req.staple ? norm(req.staple) : '';
    if(GATING_CATS.includes(cat)) alc += v;
    if(cat === 'amaro' || cat === 'bitters') bitter += v;
    if((cat === 'mixer' && SODA_SUBTYPES.includes(sub)) || (cat === 'wine' && sub === 'sparkling')) soda += v;
    if(st === 'lime' || st === 'lemon' || (cat === 'mixer' && sub === 'grapefruit juice')) citrus += v;
    if(st.includes('cream') || st.includes('egg') || st.includes('coconut') || cat === 'milk') soft += v;
  }
  if(total <= 0) return { x:.5, y:.5 };
  const af = alc / total;
  let x = .5 + (citrus/total)*1.2 - (bitter/total)*1.5;
  let y = .5 + (soda/total)*1.2 + (1-af)*.3 - af*.45;
  if(r.method === 'stir' && soda === 0) y -= .08;
  const pull = Math.min(.6, (soft/total)*1.2);
  x = .5 + (x-.5)*(1-pull); y = .5 + (y-.5)*(1-pull);
  return { x: Math.min(.96, Math.max(.04, x)), y: Math.min(.96, Math.max(.04, y)) };
}
function flavorPos(r){
  const f = r && r.flavor;
  if(f && typeof f.x === 'number' && typeof f.y === 'number' && isFinite(f.x) && isFinite(f.y))
    return { x: Math.min(.96, Math.max(.04, f.x)), y: Math.min(.96, Math.max(.04, f.y)) };
  return flavorOf(r);
}
function starJitter(id){ // deterministic — overlapping stars separate the same way every render
  let h = 0; const s = String(id||'');
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) >>> 0;
  return { dx: ((h % 97)/96 - .5) * 9, dy: (((h >>> 8) % 89)/88 - .5) * 9 };
}
function starXY(r){ // final field position, in the 400×400 viewBox
  const p = flavorPos(r), j = starJitter(r.id), pad = 26, F = 400;
  return { x: Math.round((pad + p.x*(F-2*pad) + j.dx)*10)/10,

}
// A crowded sky turns labels into mush, so labels are placed greedily with
// collision checks: right of the star, else left, below, above — else dropped
// (the star stays lit and tappable). House drinks always keep their label;
// higher-rated drinks win contested space. Deterministic, so the sky never
// reshuffles between renders.
function starLabel(name){ return name.length > 14 ? name.slice(0, 13) + '…' : name; }
function starLabelW(name){ return starLabel(name).length * 5.6 + 6; }
const STAR_LABEL_CAND = [
  { dx:9,  dy:3.5, anchor:'start'  },
  { dx:-9, dy:3.5, anchor:'end'    },
  { dx:0,  dy:16,  anchor:'middle' },
  { dx:0,  dy:-10, anchor:'middle' },

function layoutStarLabels(stars){ // stars: [{id,x,y,name,house,rating}] -> {id: candidate|null}
  const order = stars.slice().sort((a,z) =>
    (a.house?0:1) - (z.house?0:1) || (z.rating||0) - (a.rating||0) || a.name.localeCompare(z.name) || (a.id < z.id ? -1 : 1));

  const placed = stars.map(s => ({ x0: s.x-8, y0: s.y-6, x1: s.x+8, y1: s.y+6 }));
  const out = {}, H = 11;
  for(const s of order){
    const w = starLabelW(s.name);
    let pick = null;
    for(const c of STAR_LABEL_CAND){
      const x0 = c.anchor === 'start' ? s.x + c.dx : c.anchor === 'end' ? s.x + c.dx - w : s.x - w/2;
      const y0 = s.y + c.dy - 9;
      const box = { x0, y0, x1: x0 + w, y1: y0 + H };
      if(box.x0 < 4 || box.x1 > 396 || box.y0 < 20 || box.y1 > 388) continue;
      if(placed.some(p => box.x0 < p.x1 && p.x0 < box.x1 && box.y0 < p.y1 && p.y0 < box.y1)) continue;

    }

  }

}

/* ============================== liquid intelligence ============================== */
// The physics of chilling and dilution (constants after Dave Arnold's Liquid
// Intelligence). Essentially ALL chilling comes from melting ice, so temperature
// and dilution are two views of one energy balance:
//   m_w(T) = m_d · c_d · (T0 − T) / (L_f + c_w · T)
const LI_T0 = 20;            // drink starts at room temperature, °C (ice at 0°C)
const LI_C_DRINK = 3.8;      // specific heat of a water-ethanol mix, J/g·K
const LI_C_WATER = 4.18;     // specific heat of the melt water, J/g·K
const LI_L_FUSION = 334;     // enthalpy of fusion of ice, J/g — dominates the balance
const LI_ETHANOL_D = 0.789;  // ethanol density, g/ml
const OZ_ML = 29.5735;
// shake: violent contact with small ice — equilibrates in seconds, lands colder.
// stir: gentle contact — keeps improving past a minute, asymptotically, warmer floor.
const LI_METHODS = {
  shake: { Teq:-7, tau:4 },   // a hard shake is basically done by 12–15 seconds
  stir:  { Teq:-4, tau:25 },
};
const LI_ABV = { tequila:.40, mezcal:.40, whiskey:.40, rum:.40, gin:.40, vodka:.40, brandy:.40,
  amaro:.25, liqueur:.25, vermouth:.16, wine:.12, bitters:.45 };
const LI_UNIT_OZ = { oz:1, ml:1/OZ_ML, cup:8, gallon:128, tsp:1/6, bsp:1/8, dash:0.03 };
function ingAbv(req){
  if(!req || req.staple) return 0;
  let cat=null, sub='';
  if(req.tag){ cat = norm(req.tag.category); sub = norm(req.tag.subtype||''); }
  else if(req.bottleId){ const b = S.bottles.find(x => x.id === req.bottleId); if(b){ cat = norm(b.category); sub = norm(b.subtype||''); } }
  if(!cat) return 0;
  if(cat === 'rum' && sub === 'overproof') return .60;
  return LI_ABV[cat] || 0;
}
function ingVolOz(ing){
  const n = parseFloat(ing && ing.qty);
  if(!isFinite(n) || n <= 0) return 0;
  return n * (LI_UNIT_OZ[ing.unit] || 0); // drop/leaf/wedge/pinch/rinse/whole/top: zero volume
}
function drinkStats(r){
  let volOz = 0, alcOz = 0;
  for(const ing of (r && r.ingredients) || []){
    const v = ingVolOz(ing); if(v <= 0) continue;
    volOz += v; alcOz += v * ingAbv(ing.req);
  }
  if(volOz <= 0) return null;
  const volMl = volOz * OZ_ML, alcMl = alcOz * OZ_ML;
  const massG = (volMl - alcMl) + alcMl * LI_ETHANOL_D; // syrups & juices count as water
  return { volOz, volMl, alcOz, abv: alcOz/volOz, massG };
}
function meltMassAt(massG, T){ return massG * LI_C_DRINK * (LI_T0 - T) / (LI_L_FUSION + LI_C_WATER * T); }
function chillCurve(r, method, seconds){
  const st = drinkStats(r), M = LI_METHODS[method];
  if(!st || !M) return null;
  const out = [];
  for(let t = 0; t <= seconds; t++){
    const temp = M.Teq + (LI_T0 - M.Teq) * Math.exp(-t / M.tau);
    const mw = meltMassAt(st.massG, temp);
    out.push({ t, temp, dilutionPct: mw/st.massG*100, abv: st.alcOz/(st.volOz + mw/OZ_ML) });
  }
  return out;
}
function liServe(method){ // seconds until within 0.5°C of the method's equilibrium
  const M = LI_METHODS[method];
  return Math.ceil(M.tau * Math.log((LI_T0 - M.Teq) / 0.5));
}
function fmtTemp(t){ const v = Math.round(t*2)/2; return (v < 0 ? '−' : '') + Math.abs(v) + '°C'; }

  ['vermouth/sweet',13], ['vermouth',3], ['wine/sparkling',1], ['wine',1], ['bitters',5],
  ['mixer/soda water',0], ['mixer/tonic',9], ['mixer/ginger beer',10], ['mixer/cola',11],
  ['mixer/grapefruit soda',10], ['mixer/pineapple juice',10], ['mixer/grapefruit juice',8],
  ['mixer/orgeat',40], ['mixer',5], ['milk',5],
];
function sugarOf(req){
  if(!req) return 2;
  if(req.staple){ const s = SUGAR_STAPLES[norm(req.staple)]; return s == null ? 2 : s; }

  if(req.tag){ cat = norm(req.tag.category); sub = norm(req.tag.subtype||''); }
  else if(req.bottleId){ const b = S.bottles.find(x => x.id === req.bottleId); if(b){ cat = norm(b.category); sub = norm(b.subtype||''); } }
  if(!cat) return 2;
  for(const [k, g] of SUGAR_TAGS){

/* ============================== wishlist ============================== */
function upsertWish(wi){
  if(!wi.id) wi.id = uid('w');
  wi.name = (wi.name||'').trim();
  if(!wi.name) return null;
  const i = S.wishlist.findIndex(x => x.id === wi.id);
  const prev = i >= 0 ? S.wishlist[i] : null;
  if(i >= 0) S.wishlist[i] = wi; else S.wishlist.push(wi);
  if(wi.img){
    // photos are the quota risk: persist atomically or visibly not at all
    if(!saveNow()){
      if(prev) S.wishlist[i] = prev; else S.wishlist.pop();
      toast('That photo doesn’t fit in storage. Remove a photo or export a backup.');
      renderAll();
      return null;
    }
  } else save();
  renderAll(); return wi.id;
}
function deleteWish(id){ S.wishlist = S.wishlist.filter(x => x.id !== id); save(); renderAll(); }
let _wishFileCb = null;

/* ============================== export / import ============================== */
function exportJSON(){ return JSON.stringify(S, null, 2); }
function importJSON(text){
  let d = null;
  try{ d = JSON.parse(text); }catch(e){ return 'That file isn’t valid JSON.'; }
  if(!d || d.v !== 1 || !Array.isArray(d.bottles) || !Array.isArray(d.recipes)) return 'That doesn’t look like a Home Bar backup.';
  if(!Array.isArray(d.staples)) d.staples = DEFAULT_STAPLES.slice();
  if(typeof d.menuTitle !== 'string') d.menuTitle = "CJ's Bar";
  if(!Array.isArray(d.collapsedCats)) d.collapsedCats = [];
  if(!Array.isArray(d.wishlist)) d.wishlist = [];
  if(!Array.isArray(d.menuSelection)) d.menuSelection = null;
  if(!Array.isArray(d.pourSelection)) d.pourSelection = null;
  if(typeof d.featureId !== 'string') d.featureId = null;
  if(typeof d.featureLabel !== 'string' || !d.featureLabel.trim()) d.featureLabel = 'drink of the night';
  if(!Array.isArray(d.beerWine)) d.beerWine = [];
  if(!Array.isArray(d.customBW)) d.customBW = [];
  if(typeof d.menuId !== 'string') d.menuId = null;
  if(typeof d.menuOwner !== 'string') d.menuOwner = null;
  if(typeof d.savedAt !== 'number') d.savedAt = 0;
  if(d.shelfView !== 'bar') d.shelfView = 'list';
  if(d.specsView !== 'sky') d.specsView = 'list';
  d.nerdMode = d.nerdMode === true;
  backfillFlavors(d.recipes);
  d.menuTheme = validTheme(d.menuTheme);
  d.geo = cleanGeo(d.geo);
  d.geoAsked = d.geoAsked === true;
  S = d; save(); renderAll(); return null;
}
function downloadBackup(){
  const blob = new Blob([exportJSON()], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'home-bar-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

const SYNC_KEY = 'bar-v1-sync';
let SYNC = (function(){ try{ const d = JSON.parse(localStorage.getItem(SYNC_KEY)||'null'); if(d && typeof d.token === 'string') return d; }catch(e){} return null; })();
function saveSyncMeta(){ try{ localStorage.setItem(SYNC_KEY, JSON.stringify(SYNC)); }catch(e){} }
function newSyncToken(){
  try{
    const a = crypto.getRandomValues(new Uint8Array(16));
    return [...a].map(b => b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    let s = ''; for(let i=0;i<32;i++) s += Math.floor(Math.random()*16).toString(16); return s;
  }
}
function enableSync(){
  if(!SYNC){ SYNC = { token: newSyncToken(), last: 0, remoteSavedAt: 0 }; saveSyncMeta(); }
  schedulePush(true);
}
let _pushT = null, _syncChecked = false, _syncBlocked = false;
function schedulePush(now){
  if(!SYNC || !CFG.syncUrl) return;
  clearTimeout(_pushT); _pushT = setTimeout(syncPush, now ? 50 : 4000);
}
async function doSyncPush(){
  try{
    const r = await fetch(CFG.syncUrl, { method:'PUT',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + SYNC.token },
      body: JSON.stringify(S) });
    if(r.ok){ SYNC.last = Date.now(); SYNC.remoteSavedAt = S.savedAt || 0; saveSyncMeta(); }
  }catch(e){} // offline is fine — next save retries
}
async function syncPush(){
  if(!SYNC || !CFG.syncUrl || _syncBlocked) return;
  if(!_syncChecked){
    // tripwire, once per boot: has another device pushed since we last synced?
    _syncChecked = true;
    try{
      const r = await fetch(CFG.syncUrl, { headers:{ 'Authorization':'Bearer ' + SYNC.token } });
      if(r.ok){
        const j = await r.json().catch(()=>null);
        const remoteAt = (j && typeof j.savedAt === 'number') ? j.savedAt : 0;
        if(remoteAt > (SYNC.remoteSavedAt || 0)){
          _syncBlocked = true; // pause pushes until the user picks a side
          openSyncConflict();
          return;
        }
      }

async function bootSyncCheck(){ // non-blocking heads-up; never auto-restores
  if(!SYNC || !CFG.syncUrl) return;

async function syncRestore(code){
  code = String(code||'').trim().toLowerCase();
  if(!/^[a-f0-9]{32,64}$/.test(code)) return 'That doesn’t look like a backup code.';
  if(!CFG.syncUrl) return 'Cloud backup isn’t configured.';
  let r, text;
  try{
    r = await fetch(CFG.syncUrl, { headers:{ 'Authorization':'Bearer ' + code } });
    text = await r.text();
  }catch(e){ return 'Could not reach the backup service.'; }
  if(!r.ok) return 'No backup found for that code.';

// downscale to <=maxEdge px long edge, jpeg; falls back to the raw file where canvas is unavailable
function downscaleFile(file, maxEdge, quality){
  return new Promise((resolve, reject)=>{
    const fr = new FileReader();
    fr.onerror = () => reject(new Error('could not read the photo'));
    fr.onload = () => {
      const dataUrl = String(fr.result);
      const raw = () => {
        const m = /^data:([^;]+);base64,(.*)$/.exec(dataUrl);
        if(!m) return reject(new Error('could not read the photo'));
        resolve({ dataUrl, media_type: m[1], data: m[2] });
      };
      try{
        const img = new Image();
        img.onload = () => {
          try{
            const scale = Math.min(1, maxEdge / Math.max(img.width, img.height));
            const cv = document.createElement('canvas');
            cv.width = Math.max(1, Math.round(img.width * scale));
            cv.height = Math.max(1, Math.round(img.height * scale));
            const cx = cv.getContext && cv.getContext('2d');
            if(!cx) return raw();
            cx.drawImage(img, 0, 0, cv.width, cv.height);
            const out = cv.toDataURL('image/jpeg', quality);
            const m = /^data:([^;]+);base64,(.*)$/.exec(out);
            if(!m) return raw();
            resolve({ dataUrl: out, media_type: m[1], data: m[2] });
          }catch(e){ raw(); }
        };
        img.onerror = raw;
        img.src = dataUrl;
      }catch(e){ raw(); }
    };
    fr.readAsDataURL(file);
  });
}
function fileToScanPayload(file){ return downscaleFile(file, 1568, 0.8); }

// the AI's boxes are best-effort (clipped necks, a neighbor's shoulder) — the
// confirm sheet is where a bad crop gets unticked, so validate loosely here
function validBox(b){
  return !!b && ['x','y','w','h'].every(k => typeof b[k] === 'number' && isFinite(b[k]))
    && b.x >= 0 && b.y >= 0 && b.w > 0 && b.h > 0 && b.x + b.w <= 1.001 && b.y + b.h <= 1.001;
}
function cropThumb(dataUrl, box){ // -> ~64px JPEG dataUrl, or null wherever canvas/Image can't
  return new Promise(resolve => {
    try{
      const img = new Image();
      const to = setTimeout(() => resolve(null), 4000);
      img.onload = () => {
        clearTimeout(to);
        try{
          const sx = box.x*img.width, sy = box.y*img.height;
          const sw = Math.max(1, box.w*img.width), sh = Math.max(1, box.h*img.height);
          const scale = 64 / Math.max(sw, sh);
          const cv = document.createElement('canvas');
          cv.width = Math.max(1, Math.round(sw*scale)); cv.height = Math.max(1, Math.round(sh*scale));
          const cx = cv.getContext && cv.getContext('2d');
          if(!cx) return resolve(null);
          cx.drawImage(img, sx, sy, sw, sh, 0, 0, cv.width, cv.height);
          resolve(cv.toDataURL('image/jpeg', 0.7));
        }catch(e){ resolve(null); }
      };
      img.onerror = () => { clearTimeout(to); resolve(null); };
      img.src = dataUrl;
    }catch(e){ resolve(null); }
  });
}

// spirits sometimes arrive from the AI filed as staples or category "other" —
// rescue them into their real category by word match (token-exact, so "ginger" ≠ gin)
const SPIRIT_TOKENS = {
  gin:{category:'gin'}, vodka:{category:'vodka'}, tequila:{category:'tequila'}, mezcal:{category:'mezcal'},
  rum:{category:'rum'}, brandy:{category:'brandy'}, cognac:{category:'brandy',subtype:'cognac'},
  whiskey:{category:'whiskey'}, whisky:{category:'whiskey'},
  bourbon:{category:'whiskey',subtype:'bourbon'}, scotch:{category:'whiskey',subtype:'scotch'}, rye:{category:'whiskey',subtype:'rye'},
};
function spiritFromText(s){
  for(const tok of norm(s||'').split(/[^a-z]+/)){ if(SPIRIT_TOKENS[tok]) return SPIRIT_TOKENS[tok]; }
  return null;
}
function spiritTag(sp){ return sp.subtype ? { tag:{ category:sp.category, subtype:sp.subtype } } : { tag:{ category:sp.category } }; }
// worker returns flat ingredients (kind/category/subtype/staple); convert to app req shape
function convertAiRecipe(rec){
  const ings = [];
  for(const i of (rec.ingredients || [])){
    let req = null;
    if(i.kind === 'staple' && i.staple){
      const sp = spiritFromText(i.staple);
      req = sp ? spiritTag(sp) : { staple: norm(i.staple) };
    }
    else if(norm(i.category||'') === 'other' && norm(i.subtype||'')){ // mislabelled as a generic bottle
      const sp = spiritFromText(i.subtype);
      req = sp ? spiritTag(sp) : { staple: norm(i.subtype) };
    }
    else if(i.category && CATEGORIES.includes(norm(i.category)))
      req = norm(i.subtype||'') ? { tag:{ category:norm(i.category), subtype:norm(i.subtype) } } : { tag:{ category:norm(i.category) } };
    if(!req) continue;
    const ing = { qty: String(i.qty||'').trim(), unit: UNITS.includes(i.unit) ? i.unit : 'oz', req };
    if(i.note) ing.note = String(i.note);
    ings.push(ing);
  }
  return { name: String(rec.name||'').trim(), method: ['stir','shake','build','blend'].includes(rec.method) ? rec.method : 'shake',
    glass: String(rec.glass||''), garnish: String(rec.garnish||''), notes: String(rec.notes||''),
    servings: Math.max(1, Math.min(999, parseInt(rec.servings, 10) || 1)),
    rating: 0, house: false, ingredients: ings.length ? ings : [null] };
}

// One open-meteo call (free, no key) for current conditions + today's sunset,
// cached in memory for 30 minutes. No geo, denied permission, or a dead fetch:
// everything downstream silently behaves exactly as before — it's a nicety.
const WX_TTL = 30*60*1000;
let _wx = { at:0, data:null };
const WMO_CONDITIONS = [[0,'clear'],[2,'fair'],[3,'cloudy'],[48,'foggy'],[57,'drizzly'],[67,'rainy'],[77,'snowy'],[82,'showery'],[86,'snowy'],[99,'stormy']];
function wxCondition(code){ for(const [max,name] of WMO_CONDITIONS) if(code <= max) return name; return 'mild'; }
async function fetchWeather(){
  if(!S.geo) return null;
  if(_wx.data && Date.now() - _wx.at < WX_TTL) return _wx.data;
  try{
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + S.geo.lat + '&longitude=' + S.geo.lon +
      '&current=temperature_2m,relative_humidity_2m,weather_code&daily=sunset&forecast_days=1&timezone=auto&timeformat=unixtime&temperature_unit=fahrenheit');
    const j = await r.json();
    const cur = j && j.current;
    if(!r.ok || !cur || typeof cur.temperature_2m !== 'number') return null;
    const sunset = j.daily && Array.isArray(j.daily.sunset) && typeof j.daily.sunset[0] === 'number' ? j.daily.sunset[0]*1000 : null;
    _wx = { at: Date.now(), data: {
      temp: cur.temperature_2m,
      humidity: typeof cur.relative_humidity_2m === 'number' ? cur.relative_humidity_2m : null,
      condition: wxCondition(cur.weather_code|0),
      sunsetAt: sunset } };
    return _wx.data;
  }catch(e){ return null; }
}
function wxLineText(wx){ return Math.round(wx.temp) + '° and ' + ((wx.humidity != null && wx.humidity >= 70) ? 'humid' : wx.condition); }
function isEveningNow(wx){ return wx.sunsetAt ? Date.now() >= wx.sunsetAt : new Date().getHours() >= 18; }
function setGeo(lat, lon){
  S.geo = cleanGeo({ lat, lon });
  _wx = { at:0, data:null };
  save();
}

function bottleSvg(b, x, top){
  const sh = shapeFor(b.category);
  const lr = liquidRect(b.category, b.level);
  const name = b.name.length > 11 ? b.name.slice(0, 10) + '…' : b.name;
  const h = ['<g class="bar-bottle', b.level === 'out' ? ' out' : '', '" data-id="', b.id, '" data-level="', b.level,
    '" data-cat="', esc(b.category), '" transform="translate(', x, ' ', top, ')">',
    '<clipPath id="clip-', b.id, '"><path d="', sh.path, '"/></clipPath>',
    '<rect class="bar-liquid ', b.level, '" x="0" width="44" y="', lr.y, '" height="', lr.h, '" clip-path="url(#clip-', b.id, ')"/>'];
  if(b.thumb){
    h.push('<clipPath id="lbl-', b.id, '"><rect x="', sh.label.x, '" y="', sh.label.y, '" width="', sh.label.w, '" height="', sh.label.h, '" rx="2"/></clipPath>',
      '<image class="bar-thumb" href="', esc(b.thumb), '" x="', sh.label.x, '" y="', sh.label.y, '" width="', sh.label.w, '" height="', sh.label.h,
      '" preserveAspectRatio="xMidYMid slice" clip-path="url(#lbl-', b.id, ')"/>');
  } else {
    const ly = sh.label.y + sh.label.h/2 - 4.5;
    h.push('<g class="lblband"><rect x="', sh.label.x, '" y="', ly, '" width="', sh.label.w, '" height="9" rx="1.5"/>',
      '<text x="22" y="', ly + 6.5, '" text-anchor="middle">', esc(b.name.slice(0, 8)), '</text></g>');
  }
  h.push('<path class="bar-outline" d="', sh.path, '"/>');
  if(b.sip) h.push('<text class="bar-sip" x="41" y="', sh.top + 3, '">&#10022;</text>');
  h.push('<text class="bar-name" x="22" y="101" text-anchor="middle">', esc(name), '</text>',
    '<g class="bar-edit" data-edit="', b.id, '"><circle cx="22" cy="112" r="9" fill="transparent"/><text x="22" y="115" text-anchor="middle">&#9998;</text></g>',
    '</g>');
  return h.join('');
}
function renderShelfBar(list, bottles){
  const prev = {}; // levels as last rendered, so a change can animate
  list.querySelectorAll('.bar-bottle').forEach(g => { prev[g.getAttribute('data-id')] = g.getAttribute('data-level'); });
  const CELL = 62, PERROW = 5, VBW = 320, ROWH = 134;
  const byCat = {};
  for(const b of bottles) (byCat[b.category] = byCat[b.category] || []).push(b);
  const html = [];
  for(const cat of CATEGORIES){
    if(!byCat[cat]) continue;
    const bs = byCat[cat].sort((a,z) => a.name.localeCompare(z.name));
    const rows = Math.ceil(bs.length / PERROW);
    html.push('<div class="cathead barhead"><span>', esc(cat), '</span><span class="cnt">', S.bottles.filter(b => b.category === cat).length, '</span></div>');
    html.push('<svg class="barshelf" data-cat="', esc(cat), '" viewBox="0 0 ', VBW, ' ', rows * ROWH, '">');
    for(let r = 0; r < rows; r++)
      html.push('<line class="shelfline" x1="2" x2="', VBW - 2, '" y1="', r*ROWH + 93, '" y2="', r*ROWH + 93, '"/>');
    bs.forEach((b, i) => {
      const row = Math.floor(i / PERROW), col = i % PERROW;
      html.push(bottleSvg(b, 5 + col*CELL + 9, row*ROWH + 4));
    });
    html.push('</svg>');
  }
  list.innerHTML = html.join('');
  list.querySelectorAll('.bar-bottle').forEach(g => {
    const id = g.getAttribute('data-id'), level = g.getAttribute('data-level'), cat = g.getAttribute('data-cat');
    g.addEventListener('click', e => {
      if(e.target.closest('.bar-edit')){ openBottleForm(id); return; }
      cycleLevel(id);
    });
    // a changed level starts the liquid at its old height, flushes styles, then
    // lets the CSS transition carry it to the new one — the drop you can see
    const was = prev[id];
    if(!was || was === level) return;
    const liq = g.querySelector('.bar-liquid');
    const from = liquidRect(cat, was), to = liquidRect(cat, level);
    liq.setAttribute('y', from.y); liq.setAttribute('height', from.h);
    liq.setAttribute('class', 'bar-liquid ' + was);
    void (g.ownerSVGElement && g.ownerSVGElement.getBoundingClientRect());
    liq.setAttribute('y', to.y); liq.setAttribute('height', to.h);
    liq.setAttribute('class', 'bar-liquid ' + level);
  });
}

/* ============================== menu themes & sundown ============================== */
// Guests dim at the HOST's sunset (carried in the payload), not their own clock's
// guess — everyone's phone dims with the actual room.
function duskNow(sunsetAt, now){ // pure: dusk from sunset until ~dawn (12h later)
  if(typeof sunsetAt !== 'number' || !(sunsetAt > 0)) return false;
  return now >= sunsetAt && now - sunsetAt < 12*3600*1000;
}
function menuSunsetAt(){
  if(sharedMenu) return (typeof sharedMenu.su === 'number' && sharedMenu.su > 0) ? sharedMenu.su : null;
  return (_wx.data && _wx.data.sunsetAt) || null;
}
function updateDusk(now){
  if(!document.body.classList.contains('menuMode')) return;
  if(duskNow(menuSunsetAt(), now == null ? Date.now() : now)) document.body.setAttribute('data-dusk','');
  else document.body.removeAttribute('data-dusk');
}
function applyMenuTheme(){
  if(!document.body.classList.contains('menuMode')) return;
  document.body.setAttribute('data-theme', validTheme(sharedMenu ? sharedMenu.th : S.menuTheme));
  updateDusk();
}
let _duskT = null;
function startDusk(){
  stopDusk();
  if(!sharedMenu) fetchWeather().then(() => updateDusk()); // host: today's sunset, geo-gated
  _duskT = setInterval(() => updateDusk(), 60000);
  setTimeout(() => document.body.classList.add('m-anim'), 80); // arm the 8s dim AFTER entry paints
}
function stopDusk(){
  if(_duskT){ clearInterval(_duskT); _duskT = null; }
  document.body.classList.remove('m-anim');
  document.body.removeAttribute('data-theme');
  document.body.removeAttribute('data-dusk');
}

const POUR_CATS = SPIRITS.concat(['amaro']);
// a drink is 86'd when everything it lacks is a bottle that IS on the shelf but ran dry
function is86d(r){
  const st = recipeStatus(r);
  if(st.makeable || !st.missing.length) return false;
  return st.missing.every(m => {
    if(m.req.bottleId){ const b = S.bottles.find(x => x.id === m.req.bottleId); return !!b && b.level === 'out'; }
    if(m.req.tag) return S.bottles.some(b => b.level === 'out' && bottleMatchesTag(b, m.req.tag));
    return false;
  });
}
function menuPayload(){
  const items = [];
  for(const r of S.recipes){
    if(!recipeStatus(r).makeable) continue;
    if(S.menuSelection && !S.menuSelection.includes(r.id)) continue;
    items.push(r);
  }
  items.sort((a,z) => (z.house?1:0) - (a.house?1:0) || (z.rating||0) - (a.rating||0) || a.name.localeCompare(z.name));
  let f = null;
  if(S.featureId){
    const i = items.findIndex(r => r.id === S.featureId);
    if(i >= 0){
      const fr = items.splice(i, 1)[0];
      f = { label: S.featureLabel || 'drink of the night', n: fr.name, d: menuDescFor(fr), h: !!fr.house };
    }
  }
  const c = items.map(r => ({ n:r.name, d:menuDescFor(r), h:!!r.house }));
  for(const r of S.recipes){ // 86'd drinks stay on the menu, struck through
    if(S.menuSelection && !S.menuSelection.includes(r.id)) continue;
    if(is86d(r)) c.push({ n:r.name, d:menuDescFor(r), h:!!r.house, x:true });
  }
  const pours = S.bottles.filter(b => b.level !== 'out' && POUR_CATS.includes(b.category)
      && (!S.pourSelection || S.pourSelection.includes(b.id)))
    .sort((a,z) => POUR_CATS.indexOf(a.category) - POUR_CATS.indexOf(z.category)
      || (a.sip?0:1) - (z.sip?0:1) || a.name.localeCompare(z.name)); // sipping bottles lead their category
  const payload = { t: S.menuTitle, c, s: pours.map(b => ({ n:b.name, c:b.category, t:norm(b.subtype||'') })) };
  if(f) payload.f = f;
  if(S.beerWine.length) payload.b = S.beerWine.slice(0, 50);
  payload.th = validTheme(S.menuTheme); // guests get the host's theme…
  const su = _wx.data && _wx.data.sunsetAt;
  if(typeof su === 'number' && su > 0) payload.su = su; // …and dim at the host's sunset
  return payload;
}

/* the whole menu travels inside the link's #hash — nothing is uploaded anywhere */
function b64uEncode(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64uDecode(s){ s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length % 4) s += '='; return decodeURIComponent(escape(atob(s))); }
function buildMenuLink(){ return location.origin + location.pathname + '#m=' + b64uEncode(JSON.stringify(menuPayload())); }
function validMenuPayload(p){ return !!(p && typeof p.t === 'string' && Array.isArray(p.c) && Array.isArray(p.s)); }
function parseMenuHash(hash){
  const m = /^#m=(.+)$/.exec(hash || ''); if(!m) return null;
  try{
    const p = JSON.parse(b64uDecode(m[1]));
    return validMenuPayload(p) ? p : null;
  }catch(e){ return null; }
}
function enterSharedMenu(p){ sharedMenu = p; setTab('menu'); }
// stable short link: ONE long-lived menu id per bar, updated in place with an
// owner token — guests keep the same URL and their requests keep landing.
// Falls back to the long #m= link when the worker is unreachable.
let _menuPush = { key:null, url:null }; // last successfully pushed payload
async function ensureMenuLink(){
  const payload = menuPayload();
  const key = JSON.stringify(payload);
  if(!CFG.menuUrl) return buildMenuLink();
  if(S.menuId && S.menuOwner){
    const url = CFG.menuPage + S.menuId;
    if(_menuPush.key === key && _menuPush.url === url) return url; // unchanged: costs nothing
    try{
      const r = await fetch(CFG.menuUrl + '/' + S.menuId, { method:'PUT',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + S.menuOwner }, body: key });
      if(r.ok){ _menuPush = { key, url }; return url; }
      if(r.status === 404 || r.status === 403){ // expired or revoked: mint fresh
        S.menuId = null; S.menuOwner = null; _menuPush = { key:null, url:null }; save();
        return ensureMenuLink();
      }
    }catch(e){}
    return buildMenuLink(); // temporarily unreachable — don't cache the fallback
  }
  try{
    const r = await fetch(CFG.menuUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body: key });
    const j = await r.json().catch(()=>null);
    if(r.ok && j && /^[A-Za-z0-9]{4,32}$/.test(String(j.id||'')) && /^[a-f0-9]{32,64}$/.test(String(j.owner||''))){
      S.menuId = j.id; S.menuOwner = j.owner; save();
      const url = CFG.menuPage + j.id;
      _menuPush = { key, url };
      return url;
    }
  }catch(e){}
  return buildMenuLink();
}
async function rotateMenuLink(){ // revoke last month's link, mint a fresh one
  if(S.menuId && S.menuOwner && CFG.menuUrl){
    try{ await fetch(CFG.menuUrl + '/' + S.menuId, { method:'DELETE', headers:{ 'Authorization':'Bearer ' + S.menuOwner } }); }catch(e){}
  }
  S.menuId = null; S.menuOwner = null; _menuPush = { key:null, url:null }; save();
  const url = await ensureMenuLink();
  toast(url.indexOf(CFG.menuPage) === 0 ? 'Fresh menu link ready — the old one is dead.' : 'Old link revoked; new short link when back online.');
}

let _guestKey = null, _guestT = null, _guestWarned = false;
async function refreshSharedMenu(){
  if(!sharedMenu || !sharedMenuId || !CFG.menuUrl) return;
  try{
    const r = await fetch(CFG.menuUrl + '/' + sharedMenuId);
    if(r.status === 404){
      if(!_guestWarned){ _guestWarned = true; toast('This menu may be out of date.'); }
      return; // keep the last rendered payload
    }
    const j = await r.json().catch(()=>null);
    if(!r.ok || !validMenuPayload(j)) return;

  }catch(e){}

function liVerdict(li){
  const p = li.main[Math.min(li.D, Math.max(5, Math.round(li.serve/5)*5))];
  return (li.method === 'shake' ? 'Shake' : 'Stir') + ' about ' + p.t + ' seconds: ' + fmtTemp(p.temp) +
    ', ' + Math.round(p.dilutionPct) + '% dilution, lands at ' + Math.round(p.abv*100) + '% ABV.';
}
function liBodyHtml(li){
  const path = (pts, y) => pts.map((p,i) => (i?'L':'M') + Math.round(liX(li,p.t)*10)/10 + ' ' + Math.round(y(p)*10)/10).join('');
  const xs = liX(li, li.serve);
  const sp = li.main[li.serve];
  const axL = [[20,'20°'],[0,'0°'],[-10,'−10°']].map(a => '<text class="li-ax" x="' + (LI_PL-4) + '" y="' + (liYT(a[0])+3) + '" text-anchor="end">' + a[1] + '</text>').join('');
  const axR = [[0,'0%'],[30,'30%'],[60,'60%']].map(a => '<text class="li-ax" x="' + (LI_W-LI_PR+5) + '" y="' + (liYD(a[0])+3) + '">' + a[1] + '</text>').join('');
  const axB = '<text class="li-ax" x="' + LI_PL + '" y="' + (LI_H-6) + '">0s</text>' +
    '<text class="li-ax" x="' + (LI_W-LI_PR) + '" y="' + (LI_H-6) + '" text-anchor="end">' + li.D + 's</text>';
  const mid = Math.round(li.D*0.55);
  return '<svg id="li-chart" viewBox="0 0 ' + LI_W + ' ' + LI_H + '">' +
    '<path class="li-ghost" d="' + path(li.ghost, p => liYT(p.temp)) + '"/>' +
    '<path class="li-dil" d="' + path(li.main, p => liYD(p.dilutionPct)) + '"/>' +
    '<path class="li-temp" d="' + path(li.main, p => liYT(p.temp)) + '"/>' +
    '<text class="li-ax li-lbl" fill="var(--brass2)" x="' + liX(li,mid) + '" y="' + (liYT(li.main[mid].temp)-5) + '" text-anchor="middle">temperature</text>' +
    '<text class="li-ax li-lbl" fill="var(--ink)" x="' + liX(li,mid) + '" y="' + (liYD(li.main[mid].dilutionPct)+11) + '" text-anchor="middle">dilution</text>' +
    '<line class="li-target" x1="' + xs + '" x2="' + xs + '" y1="' + LI_PT + '" y2="' + (LI_H-LI_PB) + '"/>' +
    '<circle cx="' + xs + '" cy="' + liYT(sp.temp) + '" r="3" fill="var(--brass2)"/>' +
    '<line id="li-cursor" x1="' + xs + '" x2="' + xs + '" y1="' + LI_PT + '" y2="' + (LI_H-LI_PB) + '"/>' +
    axL + axR + axB +
    '<rect x="' + LI_PL + '" y="0" width="' + (LI_W-LI_PL-LI_PR) + '" height="' + LI_H + '" fill="transparent" style="pointer-events:all"/>' +
    '</svg>' +
    '<div id="li-read" class="small mut"></div>' +
    '<div id="li-verdict">' + esc(liVerdict(li)) + '</div>' +
    '<div class="small dim">dashed = ' + (li.method === 'shake' ? 'stirred' : 'shaken') + ' instead &middot; drag the chart to scrub</div>';
}
function wireLI(li){
  const tog = document.getElementById('li-toggle');
  if(!tog) return;
  tog.onclick = () => {
    const body = document.getElementById('li-body');
    body.classList.toggle('hidden');
    document.getElementById('li-chev').innerHTML = body.classList.contains('hidden') ? '&#9656;' : '&#9662;';
  };
  const svg = document.getElementById('li-chart');
  const setCursor = t => {
    t = Math.max(0, Math.min(li.D, Math.round(t)));
    const p = li.main[t], x = liX(li, t);
    const c = document.getElementById('li-cursor');
    c.setAttribute('x1', x); c.setAttribute('x2', x);
    document.getElementById('li-read').textContent = t + ' s — ' + fmtTemp(p.temp) + ' · ' +
      Math.round(p.dilutionPct) + '% dilution · ' + Math.round(p.abv*100) + '% ABV';
  };
  const fromEvent = ev => {
    const rect = svg.getBoundingClientRect();
    const rel = ((ev.clientX||0) - rect.left) * (LI_W / (rect.width || LI_W));
    setCursor((rel - LI_PL) / (LI_W - LI_PL - LI_PR) * li.D);
  };
  let down = false;
  svg.addEventListener('pointerdown', ev => { down = true; try{ svg.setPointerCapture(ev.pointerId); }catch(e){} fromEvent(ev); });
  svg.addEventListener('pointermove', ev => { if(down) fromEvent(ev); });
  svg.addEventListener('pointerup', () => { down = false; });
  svg.addEventListener('pointercancel', () => { down = false; });
  setCursor(li.serve);
}

function ingRowHtml(ing){
  const req = ing && ing.req || { tag:{ category:'whiskey' } };
  const kind = req.staple ? 'staple' : (req.bottleId ? 'bottleId' : 'tag');
  const cat = req.tag ? norm(req.tag.category) : 'whiskey';
  return '<div class="ingrow">' +
    '<div class="formrow"><input class="ir-qty" placeholder="qty" value="' + esc(ing?ing.qty:'') + '" style="max-width:80px">' +
    '<select class="ir-unit">' + UNITS.map(u => '<option' + (ing && ing.unit===u?' selected':'') + '>' + u + '</option>').join('') + '</select>' +
    '<select class="ir-kind"><option value="tag"' + (kind==='tag'?' selected':'') + '>bottle type</option>' +
      '<option value="bottleId"' + (kind==='bottleId'?' selected':'') + '>specific bottle</option>' +
      '<option value="staple"' + (kind==='staple'?' selected':'') + '>staple</option></select></div>' +
    '<div class="formrow ir-body">' + ingBodyHtml(kind, req, cat) + '</div>' +
    '<div class="rowline"><input class="ir-note" placeholder="note (optional)" value="' + esc(ing && ing.note || '') + '" style="flex:1;margin-right:8px">' +
    '<button class="del ir-del">remove</button></div></div>';
}
function ingBodyHtml(kind, req, cat){
  if(kind === 'staple'){
    // free-type: seasonal/household ingredients don't have to live in the staples list
    const v = req.staple || '';
    return '<span class="sgwrap" style="flex:1"><input class="ir-staple" placeholder="lime, cinnamon, condensed milk…" value="' + esc(v) + '" autocomplete="off"></span>';
  }
  if(kind === 'bottleId'){
    if(!S.bottles.length) return '<div class="dim small" style="padding:8px 2px">No bottles on the shelf yet.</div>';
    const cur = req.bottleId ? ((S.bottles.find(b => b.id === req.bottleId) || {}).name || '') : '';
    return '<span class="sgwrap" style="flex:1"><input class="ir-bottle" placeholder="start typing a bottle…" value="' + esc(cur) + '" autocomplete="off"></span>';
  }
  return catSelect('ir-cat', cat) + subInput('ir-sub', cat, req.tag && req.tag.subtype || '');
}
function openRecipeForm(id, pre){
  const r = pre || (id ? S.recipes.find(x => x.id === id) : { name:'', method:'shake', glass:'coupe', garnish:'', notes:'', rating:0, house:false, ingredients:[null] });
  if(!r) return;
  openModal('<button class="mclose" onclick="closeModal()">&times;</button><h2>' + (id?'Edit recipe':'New recipe') + '</h2>' +
    (!id && recipeAIEnabled() ? '<div class="aibox"><div class="ttl">&#10024; Let the AI draft it</div>' +
      '<textarea id="rf-ai-text" rows="2" placeholder="Describe it — &quot;equal parts mezcal, Aperol and lime, salt rim&quot; — or snap a photo of a written recipe."></textarea>' +
      '<div style="display:flex;gap:8px;margin-top:8px"><button class="abtn ghost" id="rf-ai-go" style="flex:1">Draft from text</button>' +
      '<button class="abtn ghost" id="rf-ai-photo" style="flex:1">From a photo</button></div></div>' : '') +
    '<label class="fieldlbl">Name</label><input id="rf-name" value="' + esc(r.name) + '" placeholder="e.g. House Coquito">' +
    '<div class="formrow"><span><label class="fieldlbl">Method</label><select id="rf-method">' + ['stir','shake','build','blend'].map(m => '<option' + (m===r.method?' selected':'') + '>' + m + '</option>').join('') + '</select></span>' +
    '<span><label class="fieldlbl">Glass</label><input id="rf-glass" value="' + esc(r.glass||'') + '" placeholder="coupe, rocks…"></span></div>' +
    '<label class="fieldlbl">Garnish</label><input id="rf-garnish" value="' + esc(r.garnish||'') + '">' +
    '<label class="fieldlbl">Makes <span class="dim">(drinks)</span></label><input id="rf-servings" type="number" min="1" value="' + (r.servings||1) + '" style="max-width:110px">' +
    '<label class="fieldlbl">Ingredients</label><div id="rf-ings">' + r.ingredients.map(ingRowHtml).join('') + '</div>' +
    '<button class="abtn ghost" id="rf-adding" style="width:100%">+ ingredient</button>' +
    '<label class="fieldlbl">Notes</label><textarea id="rf-notes" rows="2">' + esc(r.notes||'') + '</textarea>' +
    '<label class="fieldlbl">Menu description <span class="dim">(what guests see — blank = automatic)</span></label>' +
    '<input id="rf-mdesc" value="' + esc(r.menuDesc||'') + '" placeholder="e.g. Puerto Rican Christmas in a glass">' +
    '<label class="rowline" style="gap:7px;margin-top:12px"><input type="checkbox" id="rf-house" style="width:auto"' + (r.house?' checked':'') + '> House drink <span class="housestar">★</span></label>' +
    '<button class="abtn" id="rf-save" style="width:100%;margin-top:16px">Save recipe</button>');
  const ings = document.getElementById('rf-ings');
  const wire = row => {
    row.querySelector('.ir-kind').addEventListener('change', e => {
      row.querySelector('.ir-body').innerHTML = ingBodyHtml(e.target.value, {}, 'whiskey');
      wireBody(row);
    });
    row.querySelector('.ir-del').addEventListener('click', () => { if(ings.children.length > 1) row.remove(); });
    wireBody(row);
  };
  const wireBody = row => {
    const catSel = row.querySelector('.ir-cat');
    if(catSel) catSel.addEventListener('change', e => {
      row.querySelector('.ir-sub').parentNode.outerHTML = subInput('ir-sub', e.target.value, '');
    });
  };
  ings.querySelectorAll('.ingrow').forEach(wire);
  const aiGo = document.getElementById('rf-ai-go');
  if(aiGo) aiGo.onclick = () => {
    const t = document.getElementById('rf-ai-text').value.trim();
    if(!t){ toast('Describe the drink first.'); return; }
    aiDraft({ text: t });
  };
  const aiPhoto = document.getElementById('rf-ai-photo');
  if(aiPhoto) aiPhoto.onclick = () => document.getElementById('recipe-file').click();
  document.getElementById('rf-adding').onclick = () => {
    ings.insertAdjacentHTML('beforeend', ingRowHtml(null));
    wire(ings.lastElementChild);
  };
  document.getElementById('rf-save').onclick = () => {
    const ingredients = [];
    let badBottle = null;
    ings.querySelectorAll('.ingrow').forEach(row => {
      const kind = row.querySelector('.ir-kind').value;
      let req = null;
      if(kind === 'staple'){ const el = row.querySelector('.ir-staple'); if(el && el.value.trim()) req = { staple: el.value.trim() }; }
      else if(kind === 'bottleId'){
        const el = row.querySelector('.ir-bottle');
        if(el){
          const b = S.bottles.find(x => norm(x.name) === norm(el.value));
          if(!b){ badBottle = el.value.trim(); return; }
          req = { bottleId: b.id };
        }
      }
      else {
        const cat = row.querySelector('.ir-cat').value, sub = row.querySelector('.ir-sub').value.trim();
        req = sub ? { tag:{ category:cat, subtype:sub } } : { tag:{ category:cat } };
      }
      if(!req) return;
      const ing = { qty: row.querySelector('.ir-qty').value.trim(), unit: row.querySelector('.ir-unit').value, req };
      const note = row.querySelector('.ir-note').value.trim(); if(note) ing.note = note;
      ingredients.push(ing);
    });
    if(badBottle !== null){
      toast(badBottle ? 'No bottle called “' + badBottle + '” on the shelf — pick one from the suggestions.' : 'Pick a bottle for the “specific bottle” ingredient.');
      return;
    }
    const ok = upsertRecipe({ id: id || undefined, name: document.getElementById('rf-name').value,
      servings: document.getElementById('rf-servings').value,
      method: document.getElementById('rf-method').value, glass: document.getElementById('rf-glass').value.trim(),
      garnish: document.getElementById('rf-garnish').value.trim(), notes: document.getElementById('rf-notes').value,
      menuDesc: document.getElementById('rf-mdesc').value.trim(),
      rating: r.rating||0, house: document.getElementById('rf-house').checked, flavor: r.flavor, ingredients });
    if(!ok){ toast('A recipe needs a name and at least one ingredient.'); return; }
    closeModal();
  };
}

  e.target.value = '';
  if(!f) return;
  fileToScanPayload(f).then(p => aiDraft({ media_type: p.media_type, data: p.data }))
    .catch(() => toast('Could not read that photo.'));
});
document.getElementById('menu-share').addEventListener('click', shareMenu);
document.getElementById('menu-curate').addEventListener('click', openMenuPicker);
document.getElementById('menu-reqs').addEventListener('click', openRequestInbox);
document.getElementById('bt-ask').addEventListener('click', askBartender);
document.getElementById('btn-addwish').addEventListener('click', () => openWishForm(null));
document.getElementById('wish-file').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!f || !_wishFileCb) return;
  downscaleFile(f, 512, 0.75).then(p => _wishFileCb(p)).catch(() => toast('Could not read that photo.'));
});
document.getElementById('import-file').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!f) return;
  const fr = new FileReader();
  fr.onload = () => {
    const err = importJSON(String(fr.result));
    if(err) toast(err); else { closeModal(); toast('Backup restored.'); }
  };
  fr.readAsText(f);
});
document.getElementById('shelf-search').addEventListener('input', e => { shelfQuery = e.target.value; renderShelf(); });
document.getElementById('spec-search').addEventListener('input', e => { specQuery = e.target.value; renderSpecs(); });
document.getElementById('btn-shelfview').addEventListener('click', () => { S.shelfView = S.shelfView === 'bar' ? 'list' : 'bar'; save(); renderShelf(); });
document.getElementById('btn-specsview').addEventListener('click', () => { S.specsView = S.specsView === 'sky' ? 'list' : 'sky'; save(); renderSpecs(); });
document.getElementById('menu-exit').addEventListener('click', () => setTab('shelf'));
document.querySelectorAll('#tabbar button').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));
document.getElementById('modalwrap').addEventListener('click', e => { if(e.target.id === 'modalwrap') closeModal(); });
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState !== 'visible') return;
  if(sharedMenu && sharedMenuId) refreshSharedMenu();   // guest: pull the live menu
  else if(tab === 'menu' && !sharedMenu) refreshReqCount(); // host: freshen the bell
});
setTab('shelf');
// opened via a shared-menu link? lock straight into the guest menu
(function(){
  const s = /^#s=([A-Za-z0-9]{4,32})$/.exec(location.hash);
  if(s){ loadSharedMenu(s[1]); return; }
  const p = parseMenuHash(location.hash);
  if(p) enterSharedMenu(p);
})();
bootSyncCheck(); // heads-up if the cloud copy is newer than this device
</script>
</body>
</html>
